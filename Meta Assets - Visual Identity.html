  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"8bd68768-4d75-4512-b944-c4cc58b91282\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"07b7dc88-93ea-4077-9c30-250865f6027d\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"4453ac30-ac02-477d-9e05-aa0205f861f9\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"8bd68768-4d75-4512-b944-c4cc58b91282\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root{\n  /* Brand core */\n  --green:        #38C354;   /* Meta Green — primary */\n  --green-bright: #57E875;   /* hover / glow lift */\n  --green-deep:   #1E7E36;   /* shadow / pressed */\n  --aqua:         #1FE3C2;   /* Signal Aqua — organic cyan accent */\n  --aqua-bright:  #5BF2DA;\n  --teal:         #119E92;   /* gradient mid */\n\n  /* Brand gradient */\n  --grad-core:  linear-gradient(135deg, var(--green) 0%, var(--aqua) 100%);\n  --grad-soft:  linear-gradient(135deg, #2FB84E 0%, #15C9B6 100%);\n  --grad-text:  linear-gradient(100deg, #6BF08A 0%, #38C354 38%, #1FE3C2 100%);\n\n  /* Dark neutrals (green-tinted) */\n  --void:    #05090A;   /* page base */\n  --ink:     #080F10;   /* alt section */\n  --carbon:  #0C1517;   /* raised */\n  --slate:   #11201F;\n\n  /* Text */\n  --text:        #EAF5EF;\n  --text-dim:    #9CB2AA;\n  --text-faint:  #56716A;\n  --text-ghost:  #2E433E;\n\n  /* Glass */\n  --glass-bg:     rgba(180, 255, 220, 0.035);\n  --glass-bg-2:   rgba(180, 255, 220, 0.06);\n  --glass-line:   rgba(140, 240, 200, 0.14);\n  --glass-line-2: rgba(140, 240, 200, 0.22);\n  --glass-hi:     rgba(220, 255, 240, 0.10);\n\n  /* Glow */\n  --glow-green: 0 0 40px rgba(56,195,84,0.45);\n  --glow-aqua:  0 0 40px rgba(31,227,194,0.40);\n\n  /* Type */\n  --f-display: 'Space Grotesk', system-ui, sans-serif;\n  --f-mono:    'IBM Plex Mono', ui-monospace, monospace;\n\n  /* Rhythm */\n  --maxw: 1200px;\n  --pad:  clamp(20px, 5vw, 64px);\n  --r-sm: 10px;\n  --r-md: 16px;\n  --r-lg: 24px;\n  --r-xl: 32px;\n}\n\n*{ box-sizing:border-box; }\nhtml{ scroll-behavior:smooth; }\nbody{\n  margin:0;\n  background:var(--void);\n  color:var(--text);\n  font-family:var(--f-display);\n  font-weight:400;\n  line-height:1.55;\n  -webkit-font-smoothing:antialiased;\n  text-rendering:optimizeLegibility;\n  overflow-x:hidden;\n}\n::selection{ background:rgba(56,195,84,0.30); color:#fff; }\n\n/* page ambient aurora */\nbody::before{\n  content:'';\n  position:fixed; inset:0; z-index:-2;\n  background:\n    radial-gradient(60% 50% at 78% -5%, rgba(31,227,194,0.10), transparent 70%),\n    radial-gradient(55% 45% at 12% 8%, rgba(56,195,84,0.10), transparent 70%),\n    radial-gradient(80% 60% at 50% 120%, rgba(17,158,146,0.10), transparent 70%);\n  pointer-events:none;\n}\nbody::after{\n  content:'';\n  position:fixed; inset:0; z-index:-1;\n  background-image:radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);\n  background-size:3px 3px;\n  pointer-events:none; opacity:0.5;\n}\n\n/* ---- Typography helpers ---- */\nh1,h2,h3,h4{ font-weight:600; letter-spacing:-0.02em; line-height:1.05; margin:0; }\np{ margin:0; }\na{ color:inherit; text-decoration:none; }\n\n.eyebrow{\n  font-family:var(--f-mono);\n  font-size:12px; font-weight:500;\n  letter-spacing:0.28em; text-transform:uppercase;\n  color:var(--aqua);\n  display:inline-flex; align-items:center; gap:10px;\n}\n.eyebrow::before{\n  content:''; width:26px; height:1px; background:var(--aqua); opacity:0.6;\n}\n.grad-text{\n  background:var(--grad-text);\n  -webkit-background-clip:text; background-clip:text;\n  -webkit-text-fill-color:transparent; color:transparent;\n}\n.mono{ font-family:var(--f-mono); }\n.dim{ color:var(--text-dim); }\n.faint{ color:var(--text-faint); }\n\n/* ---- Layout ---- */\n.wrap{ max-width:var(--maxw); margin:0 auto; padding-left:var(--pad); padding-right:var(--pad); }\nsection{ position:relative; padding:clamp(72px,11vh,140px) 0; }\n.sec-head{ max-width:760px; margin-bottom:56px; }\n.sec-head .num{ font-family:var(--f-mono); color:var(--text-faint); font-size:13px; letter-spacing:0.2em; }\n.sec-title{ font-size:clamp(34px,5vw,60px); margin:18px 0 20px; letter-spacing:-0.03em; }\n.sec-desc{ font-size:clamp(16px,1.6vw,19px); color:var(--text-dim); max-width:62ch; line-height:1.6; }\n\n.divider{ height:1px; background:linear-gradient(90deg, transparent, var(--glass-line) 20%, var(--glass-line) 80%, transparent); }\n\n/* ---- Glass panel ---- */\n.glass{\n  position:relative;\n  background:var(--glass-bg);\n  border:1px solid var(--glass-line);\n  border-radius:var(--r-lg);\n  backdrop-filter:blur(14px) saturate(120%);\n  -webkit-backdrop-filter:blur(14px) saturate(120%);\n}\n.glass::before{\n  content:''; position:absolute; inset:0; border-radius:inherit; pointer-events:none;\n  background:linear-gradient(160deg, var(--glass-hi), transparent 40%);\n  opacity:0.6;\n}\n.glass-strong{ background:var(--glass-bg-2); border-color:var(--glass-line-2); }\n\n/* ---- Grid utils ---- */\n.grid{ display:grid; gap:20px; }\n.g2{ grid-template-columns:repeat(2,1fr); }\n.g3{ grid-template-columns:repeat(3,1fr); }\n.g4{ grid-template-columns:repeat(4,1fr); }\n@media(max-width:860px){ .g2,.g3,.g4{ grid-template-columns:1fr; } }\n\n/* ---- Logo mark (background-image, capture-safe) ---- */\n.mark{\n  display:inline-block;\n  background:url(\"54cb4bba-5dc5-4b8a-ab64-b3937c11ffc1\") center/contain no-repeat;\n  aspect-ratio:623/536;\n}\n.mark.grad{  background-image:url(\"2ddd88cf-8dbe-409a-b519-09060e638269\"); }\n.mark.white{ background-image:url(\"8cdfe216-37ee-46fe-b774-6d4da68e8357\"); }\n.mark.ink{   background-image:url(\"dfbedf1f-7d8e-4ca1-a246-5148a88bb8c9\"); }\n.mark.aqua{  background-image:url(\"f6b6c141-336d-4417-b5bd-73f12a3acdc6\"); }\n.mark.red{   background-image:url(\"69434e22-d1a6-42e3-acde-eb5e7c497deb\"); }\n\n/* ---- Top nav ---- */\n.topbar{\n  position:fixed; top:0; left:0; right:0; z-index:50;\n  display:flex; align-items:center; justify-content:space-between;\n  padding:14px var(--pad);\n  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);\n  background:linear-gradient(to bottom, rgba(5,9,10,0.85), rgba(5,9,10,0.35));\n  border-bottom:1px solid var(--glass-line);\n}\n.topbar .brand{ display:flex; align-items:center; gap:11px; font-weight:600; letter-spacing:-0.01em; }\n.topbar .brand .mark{ width:26px; }\n.topbar nav{ display:flex; gap:4px; }\n.topbar nav a{\n  font-family:var(--f-mono); font-size:12px; letter-spacing:0.06em;\n  color:var(--text-dim); padding:7px 12px; border-radius:8px; transition:.2s;\n}\n.topbar nav a:hover{ color:var(--text); background:var(--glass-bg-2); }\n@media(max-width:780px){ .topbar nav{ display:none; } }\n.progress{ position:fixed; top:0; left:0; height:2px; width:0; z-index:60; background:var(--grad-core); box-shadow:var(--glow-green); }\n\n/* ---- Chips / labels ---- */\n.chip{\n  display:inline-flex; align-items:center; gap:8px;\n  font-family:var(--f-mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase;\n  color:var(--text-dim);\n  padding:6px 11px; border:1px solid var(--glass-line); border-radius:100px;\n  background:var(--glass-bg);\n}\n.chip .dot{ width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:var(--glow-green); }\n\n/* ---- Swatch ---- */\n.swatch{ border-radius:var(--r-md); overflow:hidden; border:1px solid var(--glass-line); }\n.swatch .chipcolor{ height:120px; display:flex; align-items:flex-end; padding:14px; }\n.swatch .meta{ padding:14px; background:var(--carbon); }\n.swatch .name{ font-weight:600; font-size:15px; }\n.swatch .vals{ font-family:var(--f-mono); font-size:12px; color:var(--text-dim); margin-top:6px; line-height:1.7; }\n\n/* ---- Buttons (sample components) ---- */\n.btn{\n  display:inline-flex; align-items:center; gap:9px; cursor:pointer;\n  font-family:var(--f-display); font-weight:600; font-size:15px;\n  padding:13px 22px; border-radius:100px; border:0;\n  background:var(--grad-core); color:#04130A;\n  box-shadow:0 6px 24px rgba(56,195,84,0.30); transition:.22s;\n}\n.btn:hover{ transform:translateY(-2px); box-shadow:0 10px 34px rgba(56,195,84,0.45); }\n.btn.ghost{ background:transparent; color:var(--text); border:1px solid var(--glass-line-2); box-shadow:none; }\n.btn.ghost:hover{ background:var(--glass-bg-2); border-color:var(--aqua); }\n\n/* ---- misuse cross / check ---- */\n.tag-ok,.tag-no{ position:absolute; top:12px; left:12px; width:26px; height:26px; border-radius:50%; display:grid; place-items:center; font-size:14px; font-weight:700; z-index:3; }\n.tag-ok{ background:rgba(56,195,84,0.2); color:var(--green-bright); border:1px solid var(--green); }\n.tag-no{ background:rgba(255,90,90,0.16); color:#ff7d7d; border:1px solid #ff6b6b; }\n\n/* canvas dot layers */\ncanvas.dotlayer{ display:block; width:100%; height:100%; }\n.fade-up{ opacity:0; transform:translateY(24px); transition:opacity .8s ease, transform .8s cubic-bezier(.2,.7,.2,1); }\n.fade-up.in{ opacity:1; transform:none; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<div class=\"progress\"><\u002Fdiv>\n\n<!-- ============ TOP NAV ============ -->\n<header class=\"topbar\">\n  <a class=\"brand\" href=\"#top\">\n    <span class=\"mark grad\" style=\"height:24px;width:28px\"><\u002Fspan>\n    Meta&nbsp;Assets\n  <\u002Fa>\n  <nav>\n    <a href=\"#logo\">Logo<\u002Fa>\n    <a href=\"#color\">Color<\u002Fa>\n    <a href=\"#type\">Type<\u002Fa>\n    <a href=\"#dots\">Dot System<\u002Fa>\n    <a href=\"#apps\">Applications<\u002Fa>\n  <\u002Fnav>\n  <span class=\"chip\"><span class=\"dot\"><\u002Fspan>VI&nbsp;v1.0<\u002Fspan>\n<\u002Fheader>\n\n<!-- ============ HERO ============ -->\n<section id=\"top\" style=\"min-height:100vh;display:flex;align-items:center;padding-top:80px;overflow:hidden\">\n  <canvas id=\"heroFlow\" class=\"dotlayer\" style=\"position:absolute;inset:0;z-index:0;opacity:0.9\"><\u002Fcanvas>\n  <div style=\"position:absolute;inset:0;z-index:1;background:radial-gradient(60% 70% at 50% 50%, transparent, var(--void) 92%)\"><\u002Fdiv>\n  <div class=\"wrap\" style=\"position:relative;z-index:2;width:100%\">\n    <span class=\"eyebrow\">Public Chain · Visual Identity<\u002Fspan>\n    <div style=\"display:flex;align-items:center;gap:clamp(20px,4vw,52px);flex-wrap:wrap;margin:30px 0 26px\">\n      <span class=\"mark grad\" style=\"width:clamp(120px,16vw,190px);filter:drop-shadow(0 0 40px rgba(56,195,84,0.45))\"><\u002Fspan>\n      <h1 style=\"font-size:clamp(48px,9vw,124px);letter-spacing:-0.045em;line-height:0.92\">\n        Meta<br><span class=\"grad-text\">Assets<\u002Fspan>\n      <\u002Fh1>\n    <\u002Fdiv>\n    <p style=\"font-size:clamp(18px,2.2vw,26px);max-width:30ch;color:var(--text);line-height:1.35;font-weight:300\">\n      A public chain built at <em style=\"font-style:normal\" class=\"grad-text\">human scale<\u002Fem> — frontier technology with a warm pulse.\n    <\u002Fp>\n    <div style=\"display:flex;gap:14px;margin-top:36px;flex-wrap:wrap\">\n      <a class=\"btn\" href=\"#logo\">Explore the system<\u002Fa>\n      <a class=\"btn ghost\" href=\"#apps\">See it applied<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"mono\" style=\"position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:2;color:var(--text-faint);font-size:11px;letter-spacing:0.3em\">SCROLL ↓<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ ESSENCE ============ -->\n<section id=\"essence\">\n  <div class=\"wrap\">\n    <div class=\"sec-head fade-up\">\n      <span class=\"eyebrow\">00 · Brand Idea<\u002Fspan>\n      <h2 class=\"sec-title\">Technology that keeps<br>a <span class=\"grad-text\">human pulse.<\u002Fspan><\u002Fh2>\n      <p class=\"sec-desc\">Meta Assets is infrastructure for value at human scale. The identity holds two truths at once — the precision of a protocol and the warmth of the people it serves. Geometry meets the soft, looping curve of the mark; cold data meets a living field of dots.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"grid g3\">\n      <div class=\"glass fade-up\" style=\"padding:30px\">\n        <span class=\"mono\" style=\"color:var(--aqua);font-size:13px\">01<\u002Fspan>\n        <h3 style=\"font-size:22px;margin:14px 0 10px\">Frontier<\u002Fh3>\n        <p class=\"dim\" style=\"font-size:15px\">Engineered geometry, glass surfaces and signal-grade color. The system feels built, not drawn.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"glass fade-up\" style=\"padding:30px\">\n        <span class=\"mono\" style=\"color:var(--aqua);font-size:13px\">02<\u002Fspan>\n        <h3 style=\"font-size:22px;margin:14px 0 10px\">Human<\u002Fh3>\n        <p class=\"dim\" style=\"font-size:15px\">Rounded, looping strokes and an organic dot field bring softness and care to hard infrastructure.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"glass fade-up\" style=\"padding:30px\">\n        <span class=\"mono\" style=\"color:var(--aqua);font-size:13px\">03<\u002Fspan>\n        <h3 style=\"font-size:22px;margin:14px 0 10px\">Open<\u002Fh3>\n        <p class=\"dim\" style=\"font-size:15px\">A luminous green-to-aqua gradient signals an always-on, public, permissionless network.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<div class=\"wrap\"><div class=\"divider\"><\u002Fdiv><\u002Fdiv>\n\n<!-- ============ LOGO ============ -->\n<section id=\"logo\">\n  <div class=\"wrap\">\n    <div class=\"sec-head fade-up\">\n      <span class=\"num\">01 / IDENTITY<\u002Fspan>\n      <h2 class=\"sec-title\">The Mark<\u002Fh2>\n      <p class=\"sec-desc\">A continuous looped monogram — two arches and two cradles that read as an <strong>M<\u002Fstrong> while interlocking like linked blocks. One unbroken stroke stands for an open, connected ledger; its rounded terminals carry the human warmth at the core of the brand.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- mark showcase -->\n    <div class=\"grid g2\" style=\"align-items:stretch\">\n      <div class=\"glass fade-up\" style=\"display:grid;place-items:center;padding:48px;min-height:340px;background:\n        radial-gradient(120% 100% at 50% 0%, rgba(56,195,84,0.10), transparent 60%), var(--glass-bg)\">\n        <span class=\"mark grad\" style=\"width:min(58%,300px);filter:drop-shadow(0 0 50px rgba(31,227,194,0.4))\"><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"glass fade-up\" style=\"display:grid;place-items:center;padding:30px;min-height:340px;position:relative;overflow:hidden\">\n        <canvas id=\"logoMatrix\" class=\"dotlayer\" style=\"position:absolute;inset:0\"><\u002Fcanvas>\n        <span class=\"chip\" style=\"position:absolute;left:16px;bottom:16px;z-index:2\">Dot-matrix build<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- wordmark lockups -->\n    <h3 style=\"font-size:16px;letter-spacing:0.04em;margin:46px 0 18px\" class=\"faint mono\">WORDMARK &amp; LOCKUPS<\u002Fh3>\n    <div class=\"grid g3\">\n      <div class=\"glass fade-up\" style=\"padding:32px;display:flex;align-items:center;gap:16px\">\n        <span class=\"mark grad\" style=\"height:46px;width:54px\"><\u002Fspan>\n        <span style=\"font-size:26px;font-weight:600;letter-spacing:-0.02em\">Meta&nbsp;Assets<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"glass fade-up\" style=\"padding:32px;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center\">\n        <span class=\"mark grad\" style=\"height:46px;width:54px\"><\u002Fspan>\n        <span style=\"font-size:22px;font-weight:600;letter-spacing:-0.02em\">Meta&nbsp;Assets<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"glass fade-up\" style=\"padding:32px;display:flex;align-items:center;gap:14px\">\n        <span class=\"mark white\" style=\"height:40px;width:47px\"><\u002Fspan>\n        <div style=\"line-height:1.1\">\n          <div style=\"font-size:20px;font-weight:600\">Meta Assets<\u002Fdiv>\n          <div class=\"mono\" style=\"font-size:11px;letter-spacing:0.22em;color:var(--aqua)\">PUBLIC&nbsp;CHAIN<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- clearspace + min size -->\n    <div class=\"grid g2\" style=\"margin-top:20px\">\n      <div class=\"glass fade-up\" style=\"padding:34px\">\n        <h4 style=\"font-size:15px;margin-bottom:18px\" class=\"mono faint\">CLEAR SPACE<\u002Fh4>\n        <div style=\"display:grid;place-items:center;padding:30px;border:1px dashed var(--glass-line-2);border-radius:14px;position:relative\">\n          <div style=\"position:relative;padding:38px\">\n            <span class=\"mark grad\" style=\"width:120px;display:block\"><\u002Fspan>\n            <span style=\"position:absolute;inset:0;border:1px dashed rgba(31,227,194,0.4);border-radius:8px\"><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"dim\" style=\"font-size:14px;margin-top:16px\">Keep clear space equal to the height of one arch (≈ the inner counter) on all sides. Nothing intrudes.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"glass fade-up\" style=\"padding:34px\">\n        <h4 style=\"font-size:15px;margin-bottom:18px\" class=\"mono faint\">MINIMUM SIZE<\u002Fh4>\n        <div style=\"display:flex;align-items:flex-end;gap:34px;padding:20px 0\">\n          <div style=\"text-align:center\"><span class=\"mark grad\" style=\"width:88px;display:block;margin-bottom:10px\"><\u002Fspan><span class=\"mono dim\" style=\"font-size:11px\">Digital · 24px<\u002Fspan><\u002Fdiv>\n          <div style=\"text-align:center\"><span class=\"mark grad\" style=\"width:40px;display:block;margin-bottom:10px\"><\u002Fspan><span class=\"mono dim\" style=\"font-size:11px\">Icon · 16px<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"dim\" style=\"font-size:14px;margin-top:16px\">The mark holds at 16px as a favicon / token glyph. Below that, switch to the solid single-colour cut.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- color variants -->\n    <h3 style=\"font-size:16px;letter-spacing:0.04em;margin:46px 0 18px\" class=\"faint mono\">COLOUR TREATMENTS<\u002Fh3>\n    <div class=\"grid g4\">\n      <div class=\"glass fade-up\" style=\"aspect-ratio:1;display:grid;place-items:center;background:var(--void)\"><span class=\"mark grad\" style=\"width:55%\"><\u002Fspan><\u002Fdiv>\n      <div class=\"glass fade-up\" style=\"aspect-ratio:1;display:grid;place-items:center;background:var(--carbon)\"><span class=\"mark\" style=\"width:55%;--mc:var(--green)\"><\u002Fspan><\u002Fdiv>\n      <div class=\"glass fade-up\" style=\"aspect-ratio:1;display:grid;place-items:center;background:var(--void)\"><span class=\"mark white\" style=\"width:55%\"><\u002Fspan><\u002Fdiv>\n      <div class=\"fade-up\" style=\"aspect-ratio:1;display:grid;place-items:center;border-radius:var(--r-lg);background:var(--grad-core)\"><span class=\"mark ink\" style=\"width:55%\"><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ MISUSE ============ -->\n<section id=\"misuse\" style=\"padding-top:0\">\n  <div class=\"wrap\">\n    <div class=\"sec-head fade-up\">\n      <span class=\"num\">01.2 / DON'TS<\u002Fspan>\n      <h2 class=\"sec-title\" style=\"font-size:clamp(28px,3.5vw,42px)\">Protect the mark<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"grid g4\">\n      <div class=\"glass fade-up\" style=\"aspect-ratio:1;display:grid;place-items:center;position:relative;overflow:hidden\"><span class=\"tag-no\">✕<\u002Fspan><span class=\"mark red\" style=\"width:55%\"><\u002Fspan><span class=\"mono faint\" style=\"position:absolute;bottom:12px;font-size:10px\">Off-brand colour<\u002Fspan><\u002Fdiv>\n      <div class=\"glass fade-up\" style=\"aspect-ratio:1;display:grid;place-items:center;position:relative;overflow:hidden\"><span class=\"tag-no\">✕<\u002Fspan><span class=\"mark grad\" style=\"width:55%;transform:scaleY(0.6)\"><\u002Fspan><span class=\"mono faint\" style=\"position:absolute;bottom:12px;font-size:10px\">Distort / stretch<\u002Fspan><\u002Fdiv>\n      <div class=\"glass fade-up\" style=\"aspect-ratio:1;display:grid;place-items:center;position:relative;overflow:hidden;background:linear-gradient(45deg,#f0a,#0af)\"><span class=\"tag-no\">✕<\u002Fspan><span class=\"mark white\" style=\"width:55%\"><\u002Fspan><span class=\"mono\" style=\"position:absolute;bottom:12px;font-size:10px;color:#fff\">Busy background<\u002Fspan><\u002Fdiv>\n      <div class=\"glass fade-up\" style=\"aspect-ratio:1;display:grid;place-items:center;position:relative;overflow:hidden\"><span class=\"tag-no\">✕<\u002Fspan><span class=\"mark grad\" style=\"width:55%;transform:rotate(18deg)\"><\u002Fspan><span class=\"mono faint\" style=\"position:absolute;bottom:12px;font-size:10px\">Rotate the mark<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<
